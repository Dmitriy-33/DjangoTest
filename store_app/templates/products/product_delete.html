{% extends "base.html" %}

{% block content %}
<h1>Удаление товара</h1>
<p>Вы уверены, что хотите удалить товар "{{ product.name }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Да, удалить</button>
  <a href="{% url 'product_detail' product.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
